<div class="p-3">
  <!-- <button class="btn btn-primary">{{ 'RouteSheet.OpenRoadMaps' | translate }}</button> -->
  <div class="mt-3 row">

    <div class="col-12 panel panel-inverse col-md-6">
      <div class="panel-heading">
        <h4 class="panel-title">
          <i class="fa-solid fa-route fa-lg fa-fw me-1"></i> {{ 'RouteSheet.Routewithoutclosing' | translate }}
        </h4>
      </div>
      <div>
        <ng-container *ngIf="routeSheetDetails.length > 0">
          <app-entity-list [title]="'Packages.Title' | translate" [state]="state" [columns]="columns"
            [hasPagination]="false" [showHeader]="false" [rows]="routeSheetDetails" [activeSearch]="false">
          </app-entity-list>
        </ng-container>
        <ng-template #actionTemplate let-params="params">
          <i class="fa fa-eye text-primary fs-15px me-2 pointer" ngbTooltip="{{ 'Tooltips.View' | translate }}"
            (click)="viewDetail(params.row)">
          </i>
        </ng-template>
      </div>
      <div class="d-flex justify-content-center justify-content-md-end mt-3">
        <span>
          <button class="btn btn-primary mb-2 w-100 w-md-auto">
            {{ 'RouteSheet.OpenRoadMaps' | translate }}Mark On Route
          </button>
        </span>
        <span class="ms-2">
          <button (click)="createRouteSheet()" class="btn btn-primary mb-2 w-100 w-md-auto">
            {{ 'RouteSheet.CreateRoadMap' | translate }}</button>
        </span>
      </div>
    </div>
    <div class="col-12 col-md-6 panel panel-inverse">
      <div class="panel-heading">
        <h4 class="panel-title">
          <i class="fa-solid fa-boxes-packing fa-lg fa-fw me-1"></i>{{ 'RouteSheet.PackagesonRoute' | translate }}
        </h4>
      </div>
      <div class="card-body p-3">
        <div class="row mb-3">
          <div class="col-md-4">
          </div>
          <div class="col-md-4">
            <label class="fw-bold text-nowrap mb-1">{{ 'RouteSheet.DeliveryAmountComments' | translate }}:</label>
            <input type="text" class="form-control" readonly>
          </div>
          <div class="col-md-4">
            <label class="fw-bold text-nowrap mb-1">{{ 'RouteSheet.TotalPackages' | translate }}:</label>
            <input type="text" [ngModel]="totalPackages" class="form-control" readonly>
          </div>
        </div>
        <div class="row mb-3">
          <div class="col-md-2">
            <label class="form-label mt-2">{{ 'RouteSheet.PackageId' | translate }}:</label>
          </div>
          <div class="col-md-4">
            <input type="text" [(ngModel)]="enteredPackageNumber" class="form-control" (keyup.enter)="executeMethod()">
          </div>
          <div class="col-md-3">
            <button class="btn btn-success w-100" (click)="executeMethod()">{{ 'RouteSheet.AddPackage' | translate }}</button>
          </div>
          <div class="col-md-3">
            <button class="btn btn-warning w-100" (click)="deletePackageFromRoute()">{{ 'RouteSheet.TakePackages' | translate }}</button>
          </div>
        </div>
        <div class="table-responsive">
          <ng-container *ngIf="routeSheetDetails.length > 0">
            <app-entity-list [title]="'Packages.Title' | translate" [state]="state" [columns]="packageColumns"
              [hasPagination]="false" [showHeader]="false" [rows]="PackageByRouteReport" [activeSearch]="false">
            </app-entity-list>
          </ng-container>
          <ng-template #actionWithCheckTemplate let-params="params">
            <input type="checkbox" class="form-check-input me-2" [id]="'factura-' + params.row.id"
              [(ngModel)]="params.row.selected" (change)="onCheckboxChange(params.row)">
          </ng-template>
        </div>
      </div>
    </div>
  </div>
</div>

<ng-template #openModalRef>
  <div class="modal-content">
    <div class="modal-header border-0">
      <h5 class="modal-title">{{ 'Payment.OpenSale' | translate }}</h5>
      <button type="button" (click)="closeModal()" class="btn-close" aria-label="Close"></button>
    </div>

    <div class="modal-body">
      <div class="mb-3">
        <label for="totalDollar" class="form-label">{{ 'Payment.TotalAmountDollar' | translate }}</label>
        <input type="text" class="form-control" name="totalDollar" placeholder="Enter Amount in Dollar" />
      </div>

      <div class="mb-3">
        <label for="totalLocal" class="form-label">{{ 'Payment.TotalAmountLocal' | translate }}</label>
        <input type="text" class="form-control" name="totalLocal" placeholder="Enter Amount in Local Currency" />
      </div>
    </div>

    <div class="modal-footer border-0">
      <button class="btn btn-primary">{{ 'Payment.OpenSale' | translate }}</button>
      <button class="btn btn-secondary" (click)="closeModal()">{{ 'Close' | translate }}</button>
    </div>
  </div>
</ng-template>
