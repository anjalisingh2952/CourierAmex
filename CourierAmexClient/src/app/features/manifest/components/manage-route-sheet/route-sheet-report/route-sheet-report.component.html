<div class="row p-3">
  <div class="col-12 col-md-4">
    <div class="container d-flex align-items-start">
      <label class="form-label mt-2 text-nowrap me-2">{{ 'RouteSheet.RoadMapId' | translate }}:</label>
      <input type="text" [(ngModel)]="roadMapId" class="form-control me-2" placeholder="Enter Road Map ID" />
      <button (click)="loadReport()"
        class="btn btn-primary text-nowrap">{{ 'Sidebar.GenerateReport' | translate }}</button>
    </div>
  </div>

</div>

<div class="row">
  <div class="col-6">
    <div class="flex-grow w-full h-full bg-white shadow-sm rounded">
      <div *ngIf="pdfSrc; else noData" class="h-full w-full">
        <iframe [src]="pdfSrc" class="w-full w-100 h-full border-0" style="height: 100vh;" title="Invoice PDF">
        </iframe>
      </div>
      <div id="html-container" *ngIf="!pdfSrc"></div>
      <ng-template #noData>
        <div class="d-flex flex-column align-items-center justify-content-center py-4 ">
          <i class="fa-solid fa-file-invoice-dollar text-muted mb-2" style="font-size: 3rem;"></i>
          <label class="text-muted text-center form-label">
            {{ 'GenerateReport.NoDocument' | translate }}
            <br>
            {{ 'GenerateReport.SelectDocument' | translate }}
          </label>
        </div>
      </ng-template>

    </div>
  </div>
  <div class="col-6">
    <div class="flex-grow w-full h-full bg-white shadow-sm rounded">
      <div *ngIf="pdfSrcParcel; else noData" class="h-full w-full">
        <iframe [src]="pdfSrcParcel" class="w-full w-100 h-full border-0" style="height: 100vh;" title="Invoice PDF">
        </iframe>
      </div>
      <div id="html-container" *ngIf="!pdfSrcParcel"></div>
      <ng-template #noData>
        <div class="d-flex flex-column align-items-center justify-content-center py-4 ">
          <i class="fa-solid fa-file-invoice-dollar text-muted mb-2" style="font-size: 3rem;"></i>
          <label class="text-muted text-center form-label">
            {{ 'GenerateReport.NoDocument' | translate }}
            <br>
            {{ 'GenerateReport.SelectDocument' | translate }}
          </label>
        </div>
      </ng-template>
    </div>
  </div>
</div>
