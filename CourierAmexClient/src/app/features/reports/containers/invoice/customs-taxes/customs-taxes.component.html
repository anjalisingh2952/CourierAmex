<div class="package-details">
    <shared-breadcrumb></shared-breadcrumb>
    <h1 class="page-header">{{ 'CustomsTaxes.Title' | translate }} <small>{{ 'CustomsTaxes.SubTitle' |
            translate
            }}</small>
    </h1>
    <div class="panel panel-inverse">
        <div class="panel-heading">
            <h4 class="panel-title">{{ 'CustomsTaxes.SubTitle' | translate }}</h4>
        </div>

        <div class="panel-body">
            <form class="package-form" #reportForm="ngForm" (ngSubmit)="getExcel_exportSalesReport(reportForm)"
                autocomplete="off">
                <div class="row mb-4">
                    <div class="col-md-6">
                        <label class="form-label" for="ManifestID">* {{ 'CustomsTaxes.StartDate' |
                            translate }}</label>

                        <div class="input-group">
                            <input #dateInputFromval="ngModel" name="startDate" #dateInputFrom type="date"
                                class="form-control" [(ngModel)]="startDate"
                                [ngClass]="{ 'is-invalid': dateInputFromval.invalid && dateInputFromval.touched }"
                                required />
                            <span class="input-group-text" (click)="openDatePickerFrom()">
                                <i class="fa fa-calendar"></i>
                            </span>
                        </div>
                        <div class="invalid-feedback" *ngIf="dateInputFromval.invalid && dateInputFromval.touched">
                            {{ 'Labels.FieldRequired' | translate }}
                        </div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label" for="ManifestID">* {{ 'CustomsTaxes.EndDate' |
                            translate }}</label>
                        <div class="input-group">
                            <input #dateInputToval="ngModel" name="endDate" #dateInputTo type="date"
                                class="form-control" [(ngModel)]="endDate"
                                [ngClass]="{ 'is-invalid': dateInputToval.invalid && dateInputToval.touched }"
                                required />
                            <span class="input-group-text" (click)="openDatePickerTo()">
                                <i class="fa fa-calendar"></i>
                            </span>
                        </div>
                        <div class="invalid-feedback" *ngIf="dateInputToval.invalid && dateInputToval.touched">
                            {{ 'Labels.FieldRequired' | translate }}
                        </div>
                    </div>

                    <div class="col-md-6">
                        <div class="row">

                            <div class="col-md-6 float-left mt-3">
                                <label class="block pt-2 form-label mb-0 col-md-3"> {{'CustomsTaxes.Manifest' |
                                    translate}}</label>
                                <div class="input-group mb-10px">

                                    <input type="text" [(ngModel)]="manifest" name="manifest"
                                        class="form-control">
                                </div>
                            </div>
                            <div class="col-md-6 float-left mt-3">
                                <label class="block pt-2 form-label mb-0 col-md-3">{{'CustomsTaxes.DUA' |
                                    translate}}</label>
                                <div class="input-group mb-10px">

                                    <input type="text" [(ngModel)]="DUA" name="DUA" class="form-control">
                                </div>
                            </div>

                        </div>
                        <div class="col-md-12">
                            <label class="form-label" for="ManifestID">* {{ 'SalesDetail.Name' |
                                translate }}</label>
                            <shared-search-customer [isLocked]="isLocked" [companyId]="selectedCompanyId"
                                [customerCode]="customerCode" (executeAction)="onSearchCustomer($event)">
                            </shared-search-customer>
                        </div>
                        <div class="col-md-4 float-left mt-3"><button type="submit" class="btn btn-primary">Generate
                                Report</button></div>
                    </div>

                </div>
            </form>
        </div>
    </div>
