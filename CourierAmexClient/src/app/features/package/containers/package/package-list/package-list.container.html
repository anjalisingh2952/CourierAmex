<ng-container *ngIf="entities$ | async as entities">
  <app-entity-list [title]="'Packages.Title' | translate" [subTitle]="'Packages.SubTitle' | translate"
    [addLabel]="'Labels.New' | translate" [filterTemplate]="filterTemplate" [hasAdd]="hasAdd" [state]="state"
    [pagination]="pagination" [columns]="columns" [rows]="entities" (stateChange)="onStateChange($event)"
    (add)="addNew()">
  </app-entity-list>
</ng-container>

<ng-template #filterTemplate>
  <ng-container *ngIf="companies$ | async as entities">
    <shared-dropdown [entities]="entities" [selectedEntity]="entities[0] || undefined" (onSelectEntity)="selectCompany($event)"
      *ngIf="showCompanies"></shared-dropdown>
  </ng-container>
  <ng-container *ngIf="packageStatus$ | async as entities">
    <shared-dropdown [entities]="entities" [selectedEntity]="entities[0] || undefined" (onSelectEntity)="selectStatus($event)"
      *ngIf="showCompanies"></shared-dropdown>
  </ng-container>
</ng-template>

<ng-template #actionTemplate let-params="params">
  <i class="fa fa-eye text-primary fs-15px me-2 pointer" ngbTooltip="{{ 'Tooltips.View' | translate }}"
    (click)="editEntity(params.row)"></i>
  <i class="fa fa-trash text-danger fs-15px me-2 pointer" *ngIf="hasDelete"
    ngbTooltip="{{ 'Tooltips.Delete' | translate }}" (click)="deleteEntity(params.row)"></i>
</ng-template>

<ng-template #statusTemplate let-params="params">
  <ng-container [ngSwitch]="params.row.status">
    <span *ngSwitchCase="1" class="badge bg-dark">{{ 'Labels.Draft' | translate }}</span>
    <span *ngSwitchCase="2" class="badge bg-green text-white">{{ 'Labels.Active' | translate }}</span>
    <span *ngSwitchCase="3" class="badge bg-yellow text-dark">{{ 'Labels.Inactive' | translate }}</span>
  </ng-container>
</ng-template>
