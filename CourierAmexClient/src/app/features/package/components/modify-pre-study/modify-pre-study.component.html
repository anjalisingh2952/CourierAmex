<div class="row">
    <div class="col-md-12">
        <div class="panel panel-inverse">
            <div class="panel-heading">
                <h4 class="panel-title">
                    <i class="fa fa-boxes fa-lg fa-fw me-1"></i> {{ 'PackageDetails.Title' |
                    translate }}
                </h4>
            </div>
            <div class="panel-body">
                <div class="row align-items-center">
                    <div class="col-2 col-md-2">
                        <div class="package-details" *ngIf="{ 
                            entity: entity$ | async, 
                            companies: companies$ | async,
                            manifests: manifests$ | async,
                            packages: packages$ | async
                            } as data">
                            <ng-container *ngIf="data.entity && data.companies">
                                <app-pre-study-form [entity]="data.entity" [companies]="data.companies"
                                    [manifests]="data.manifests || []" (onCompanyChange)="onCompanyChange($event)"
                                    (onManifestChange)="onManifestChange($event)">
                                </app-pre-study-form>
                            </ng-container>
                        </div>
                    </div>

                    <div class="col-1 w-auto mt-3"> <button class="btn btn-primary" (click)="getPackageItems()">Manifest Report</button></div>
                    <div class="col-1 w-auto mt-3" *ngIf="packageNumber"> <button class="btn btn-primary" (click)="getPreReportPackageItems()">Pre-Study Report</button></div>
                    <div class="col-2 col-md-2 mt-3 w-auto">
                        <div class="form-check mb-2">
                            <input [(ngModel)]="actionType" class="form-check-input" type="radio" name="actionType" id="report" value="report">
                            <label class="form-check-label" for="report">
                                Report
                            </label>
                        </div>
                        <div class="form-check mb-2">
                            <input [(ngModel)]="actionType" class="form-check-input" type="radio" name="actionType"
                                id="modification" value="modification" [checked]="true">
                            <label class="form-check-label" for="modification">
                                Modification
                            </label>
                        </div>

                    </div>
                    <div class="col-2 w-auto">
                        <img *ngIf="isDownload && actionType=='report'" (click)="exportToExcel()" src="assets/img/xls.png" alt="Export to Excel" 
                            class="float-end cursor-pointer" 
                            title="Export to Excel"
                            style="width: 35px; height: 35px; cursor: pointer; transition: transform 0.2s;"
                            onmouseover="this.style.transform='scale(1.1)'" 
                            onmouseout="this.style.transform='scale(1)'">
                           
                    </div>
                </div>
            </div>

        </div>
    </div>

   
    <div class="col-md-12">
        <div class="panel panel-inverse">
            <!-- <div class="panel-heading">
                <h4 class="panel-title">
                    <i class="fa fa-boxes fa-lg fa-fw me-1"></i>  {{ 'PackageDetails.Title' |
                    translate }} 
                </h4>
            </div> -->
            <div class="panel-body">
                <div class="row">
                    <ng-container *ngIf="actionType === 'modification'">
                        <div  class="col-12">
                            <ng-container *ngIf="entities$ | async as entities">
                                <app-entity-list [title]="''" [subTitle]="''" [state]="state"[columns]="columns" [rows]="closedPackageList" [showHeader]="false" [hasPagination]="false" [activeSearch]="false"
                                    (stateChange)="onStateChange($event)" [selectedItem]="selectedPackageItem">
                                </app-entity-list>
                            </ng-container>
                        </div>
                    </ng-container>
                    <ng-container *ngIf="actionType === 'report'">
                    <div class="col-9">
                        <ng-container *ngIf="entities$ | async as entities">
                            <app-entity-list [title]="''" [subTitle]="''" [state]="state" [columns]="columnsReport" [rows]="closedPackageList" [showHeader]="false" [hasPagination]="false" [activeSearch]="false"
                                (stateChange)="onStateChange($event)" >
                            </app-entity-list>
                        </ng-container>
                    </div>
                    <div class="col-3">
                        <label class="form-check-label" for="packageNumbers">
                            Packages:
                        </label>
                        <textarea id="packageNumbers" [(ngModel)]="packageNumber" name="packageNumbers"
                            class="form-control" rows="15"></textarea>
                    </div>
                    </ng-container>
                </div>
            </div>
        </div>
    </div>
</div>




<ng-template #quantityCellTemplate let-params="params">
    <input type="number" name="quantity" placeholder="Quantity" class="form-control"
               (ngModelChange)="quantityChange(params.row, $event)"
               (blur)="exitEditMode(params.row, 'quantity')"
               (click)="enterEditMode(params.row, 'quantity')"
               (keydown.Tab)="enterEditModeTab(params.row, 'quantity')"
               [(ngModel)]="params.row.quantity">
</ng-template>
<ng-template #unitCostCellTemplate let-params="params">
        <input type="text" name="unitCost" placeholder="Unit Cost" class="form-control"
               (ngModelChange)="unitCostChange(params.row, $event)"
               (blur)="exitEditMode(params.row, 'unitCost')"
               (click)="enterEditMode(params.row, 'unitCost')"
               (keydown.Tab)="enterEditModeTab(params.row, 'quantity')"
               [(ngModel)]="params.row.unitCost">
</ng-template>

<ng-template #descriptionCellTemplate let-params="params">
        <input type="text" name="description" class="form-control" placeholder="Description"
               (ngModelChange)="descriptionChange(params.row, $event)"
               (blur)="exitEditMode(params.row, 'description')"
               (click)="enterEditMode(params.row, 'description')"
               (keydown.Tab)="enterEditModeTab(params.row, 'quantity')"
               [(ngModel)]="params.row.description">
</ng-template>

<ng-template #characteristicsCellTemplate let-params="params">
        <input type="text" name="characteristics" class="form-control" placeholder="Characteristics"
               (ngModelChange)="characteristicsChange(params.row, $event)"
               (blur)="exitEditMode(params.row, 'characteristics')"
               (click)="enterEditMode(params.row, 'characteristics')"
               (keydown.Tab)="enterEditModeTab(params.row, 'quantity')"
               [(ngModel)]="params.row.characteristics">
</ng-template>
